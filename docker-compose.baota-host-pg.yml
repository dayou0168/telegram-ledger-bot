# Telegram 记账机器人 Go v2.2 + 宝塔宿主机 PostgreSQL
#
# 适用场景：
# - PostgreSQL 已经在宿主机/宝塔里安装好。
# - Docker Compose 里只运行 ledger-chain-watcher 和 ledger-bot。
# - 不创建 PostgreSQL 容器，也不创建数据库 volume。
#
# 宝塔 PostgreSQL 数据库名建议：
# - watcher 数据库：ledgerchainwatcher
# - 每个机器人实例一个独立数据库，例如 ledgerbotmain、ledgerbottianze、ledgerbotforward
# - 同一个机器人里的广播/转发数据和记账数据共用该机器人自己的数据库，不要拆成两个库
# 数据库名不要使用下划线、横杠、中文、空格或特殊符号。

services:
  ledger-chain-watcher:
    image: ghcr.io/dayou0168/telegram-ledger-chain-watcher:2.2
    container_name: ledger-chain-watcher
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # ==================== 必填配置：数据库 ====================
      # 使用宿主机/宝塔 PostgreSQL。请先在宝塔里创建数据库 ledgerchainwatcher，
      # 并确认用户 ledger 可以从 Docker 容器连接宿主机 PostgreSQL。
      CHAIN_WATCHER_DATABASE_URL: "postgres://ledger:改成你的PostgreSQL强密码@host.docker.internal:5432/ledgerchainwatcher?sslmode=disable"

      # ==================== 必填配置：watcher 内部鉴权 ====================
      # 允许接入 watcher 的机器人清单，格式：bot_id:secret。多个机器人用英文逗号分隔。
      # 下面的 ledger-main 必须和 ledger-bot 的 CHAIN_WATCHER_BOT_ID 一致；
      # change_this_chain_watcher_secret 必须和 ledger-bot 的 CHAIN_WATCHER_SECRET 一致。
      CHAIN_WATCHER_BOTS: "ledger-main:change_this_chain_watcher_secret"

      # ==================== 必填配置：TRON API 来源 ====================
      # 第一版 watcher 统一请求 Tronscan/TronGrid；官网 API Key 只放在 watcher 中。
      CHAIN_WATCHER_TRONSCAN_API_BASE: "https://apilist.tronscanapi.com/api"
      CHAIN_WATCHER_TRON_API_KEY: ""

      # ==================== 高级默认值 ====================
      CHAIN_WATCHER_ADDR: ":8090"
      BOT_TIMEZONE: "Asia/Shanghai"
      BOT_REQUEST_TIMEOUT: "70"
      TRON_USDT_CONTRACT: "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"
      CHAIN_WATCHER_SOURCE_POLL_SECONDS: "1"
      CHAIN_WATCHER_GLOBAL_SCAN_PAGES: "1"
      CHAIN_WATCHER_LOOKBACK_SECONDS: "600"
      CHAIN_WATCHER_CLAIM_LEASE_SECONDS: "30"
      CHAIN_WATCHER_DELIVERY_RETRY_SECONDS: "2"

      # 未来接 TRON Lite FullNode + Event Plugin V2 + Kafka 时，再由链上监听实现线程扩展：
      # CHAIN_WATCHER_SOURCE: "kafka"
      # KAFKA_BROKERS: "tron-kafka:9092"
      # KAFKA_TOPIC: "tron-events"
    expose:
      # 安全说明：watcher 只给 Docker 内部服务访问，不暴露公网端口。
      - "8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  ledger-bot:
    image: ghcr.io/dayou0168/telegram-ledger-bot-go:2.2
    container_name: ledger-bot-go
    restart: unless-stopped
    depends_on:
      ledger-chain-watcher:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # ==================== 必填配置：Telegram ====================
      TELEGRAM_BOT_TOKEN: "123456:replace-me"
      TELEGRAM_BOT_USERNAME: "your_bot_username"
      BOT_HOST_USER_ID: "123456789"

      # ==================== 必填配置：数据库 ====================
      # 使用宿主机/宝塔 PostgreSQL。请先在宝塔里创建本机器人专用数据库。
      # 这个库同时保存本机器人广播/转发配置和记账数据。
      # 示例 ledgerbotmain 适合作为主机器人或未来迁移目标；
      # 如果这是 tianzezsbot，可改为 ledgerbottianze。
      DATABASE_URL: "postgres://ledger:改成你的PostgreSQL强密码@host.docker.internal:5432/ledgerbotmain?sslmode=disable"

      # ==================== 必填配置：共享 chain-watcher ====================
      # BOT_ID / SECRET 必须和上方 watcher 的 CHAIN_WATCHER_BOTS 对应。
      CHAIN_WATCHER_URL: "http://ledger-chain-watcher:8090"
      CHAIN_WATCHER_BOT_ID: "ledger-main"
      CHAIN_WATCHER_SECRET: "change_this_chain_watcher_secret"

      # ==================== 选填配置 ====================
      # 默认操作人，多个 Telegram 数字 ID 用英文逗号分隔。
      DEFAULT_OPERATOR_USER_IDS: ""

      # 广播和记账是一体能力。每个群默认未开始记账，只保存群名并支持广播；
      # 需要记账的群，由宿主、默认操作人或本群操作员在群里发送“开始”。
      # 普通成员发送“开始”会提示没有操作权限；未开始群里的普通金额文本会被静默忽略。
      # 日切后当前群记账激活状态自动失效；新业务日需要重新发送“开始”，
      # 但汇率、费率、操作员和广播配置会继续保留。

      # 完整账单/后台公网域名，必须带 https://；不用网页账单可留空。
      PUBLIC_BILL_BASE_URL: ""

      # 后台登录密码。公网部署必须填写随机强密码；不要和 CHAIN_WATCHER_SECRET 共用。
      ADMIN_WEB_TOKEN: "change_this_admin_password"

      # ==================== 高级默认值 ====================
      BOT_TIMEZONE: "Asia/Shanghai"
      BOT_WORKER_THREADS: "16"
      BOT_CONTROL_THREADS: "6"
      BOT_CHAIN_THREADS: "12"
      BOT_RATE_THREADS: "2"
      BOT_BROADCAST_THREADS: "4"
      BOT_QUERY_THREADS: "4"
      BOT_NOTIFICATION_THREADS: "6"
      BOT_QUEUE_SIZE: "4096"
      TELEGRAM_API_BASE: "https://api.telegram.org"
      BOT_POLL_TIMEOUT: "50"
      BOT_REQUEST_TIMEOUT: "70"
      TRON_USDT_CONTRACT: "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"
      TRON_POLL_INTERVAL_SECONDS: "1"
      TRON_ADDRESS_BACKFILL_SECONDS: "60"
      TRON_INITIAL_LOOKBACK_MINUTES: "15"
      CHAIN_WATCHER_POLL_SECONDS: "1"
      CHAIN_WATCHER_BATCH_SIZE: "50"
      P2P_RATE_API_BASE: "https://p2p.army/api/fapi"
      P2P_RATE_FRONT_API: "NextVOF2Ozuh36mW0TCv"
      P2P_RATE_MARKET: "okx"
      P2P_RATE_FIAT_UNIT: "CNY"
      P2P_RATE_ASSET: "USDT"
      P2P_RATE_TRADE_METHODS: "aliPay"
      P2P_RATE_REFRESH_SECONDS: "60"
      P2P_RATE_CACHE_TTL_SECONDS: "180"
      ADMIN_WEB_ENABLED: "1"
      ADMIN_WEB_HOST: "0.0.0.0"
      ADMIN_WEB_PORT: "8080"
    ports:
      # 宝塔/Nginx 反向代理目标：http://127.0.0.1:8080
      - "8080:8080"
