# 宝塔 Docker Compose 精简版
# 填写顺序：
# 1. 先填“必填配置”，机器人才能启动。
# 2. 再按需要填“选填配置”，用于网页账单、后台、TRC20 监听等功能。
# 3. “高级配置”一般不用改，需要自定义时再取消注释。

services:
  ledger-bot:
    image: ghcr.io/dayou0168/telegram-ledger-bot:latest
    container_name: ledger-bot
    restart: unless-stopped

    environment:
      # ==================== 必填配置 ====================

      # 必填：BotFather 给你的机器人 Token。
      TELEGRAM_BOT_TOKEN: "123456:replace-me"

      # 必填：机器人用户名，不要带 @。
      TELEGRAM_BOT_USERNAME: "your_bot_username"

      # 必填：唯一宿主 Telegram 数字 ID。
      # 私聊机器人发送“我的ID”获取。
      BOT_HOST_USER_ID: "123456789"

      # ==================== 选填配置 ====================

      # 选填：程序默认操作人 Telegram 数字 ID，多个用英文逗号分隔。
      # 默认操作人可以邀请机器人、记账、广播；没有就留空。
      DEFAULT_OPERATOR_USER_IDS: ""

      # 选填但建议填写：你的网页账单/后台域名，必须带 https://。
      # 不要带空格，不要写 /day_xxb.php。
      # 例如：https://bot.tianze8.cc
      PUBLIC_BILL_BASE_URL: ""

      # 选填：账单访问 token。
      # 留空表示完整账单链接公开可访问；填写后账单链接会自动带 token。
      BILL_WEB_TOKEN: ""

      # 选填但建议填写：后台管理登录密码。
      # 填写后可通过私聊菜单“⚙后台管理”打开后台，网页会要求输入这个密码。
      ADMIN_WEB_TOKEN: "换成一串随机字符"

      # 选填但推荐：TronGrid API Key。
      # 不监听 USDT 地址可以留空；监听地址较多建议填写。
      TRONGRID_API_KEY: ""

      # ==================== 高级配置 ====================
      # 下面这些都有程序默认值，一般不用改。
      # 如果需要自定义，把前面的 # 去掉再修改值。

      # Telegram API 地址。没有自建 Bot API Server 就不用改。
      # TELEGRAM_API_BASE: "https://api.telegram.org"

      # 数据库位置。默认会持久化到下面的 Docker 卷。
      # BOT_DB_PATH: "data/ledger_bot.db"

      # 时区。账单、日切、网页时间默认都是北京时间。
      # BOT_TIMEZONE: "Asia/Shanghai"

      # 并发池。群多、广播多、监听地址多时再调。
      # BOT_WORKER_THREADS: "8"
      # BOT_CHAIN_THREADS: "8"
      # BOT_RATE_THREADS: "1"
      # BOT_BROADCAST_THREADS: "4"
      # BOT_QUERY_THREADS: "2"
      # BOT_NOTIFICATION_THREADS: "4"
      # BOT_HOST_CHECK_TTL_SECONDS: "300"

      # 网页账单服务。默认已开启，容器内监听 8080。
      # BILL_WEB_ENABLED: "1"
      # BILL_WEB_HOST: "0.0.0.0"
      # BILL_WEB_PORT: "8080"

      # 自定义完整账单 URL 模板。使用内置网页账单时不要填。
      # PUBLIC_BILL_URL_TEMPLATE: ""
      # PUBLIC_BILL_BOT_NAME: "LEDGER_BOT"

      # TRC20 监听参数。默认 1 秒轮询；机器人看到未完全确认的交易也会先通知。
      # TRONGRID_API_BASE: "https://api.trongrid.io"
      # TRON_USDT_CONTRACT: "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"
      # TRON_POLL_INTERVAL_SECONDS: "1"
      # TRON_INITIAL_LOOKBACK_MINUTES: "15"

      # Z0/实时汇率。默认 OKX，USDT 卖 CNY，支付宝档位。
      # P2P_RATE_API_BASE: "https://p2p.army/api/fapi"
      # P2P_RATE_FRONT_API: "NextVOF2Ozuh36mW0TCv"
      # P2P_RATE_MARKET: "okx"
      # P2P_RATE_FIAT_UNIT: "CNY"
      # P2P_RATE_ASSET: "USDT"
      # P2P_RATE_TRADE_METHODS: "aliPay"
      # P2P_RATE_REFRESH_SECONDS: "60"
      # P2P_RATE_CACHE_TTL_SECONDS: "180"

    ports:
      # 宝塔/Nginx 反向代理目标填：http://127.0.0.1:8080
      - "8080:8080"

    volumes:
      # 持久化数据库，重建容器不会丢账本。
      - ledger_bot_data:/app/data

volumes:
  ledger_bot_data:
