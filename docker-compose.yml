# v2.4.2 发布候选模板；仅在显式发布 workflow 成功后用于生产升级。
#
# 单机器人一体部署：
# 1. 新建宝塔 Compose 项目，把本文件完整粘贴进去。
# 2. 先填写 TELEGRAM_BOT_TOKEN、TELEGRAM_BOT_USERNAME、BOT_HOST_USER_ID。
# 3. 分别修改机器人 PostgreSQL 和 watcher PostgreSQL 的密码。
# 4. 填写 CHAIN_WATCHER_BOT_ID、CHAIN_WATCHER_SECRET，并同步到 watcher 的 CHAIN_WATCHER_BOTS。
# 5. 在 watcher 服务里填写 CHAIN_WATCHER_TRONSCAN_API_KEYS；1秒×3页长期运行建议至少3个Key。
# 6. 如果要使用完整账单/后台，把 PUBLIC_BILL_BASE_URL 改成你的 HTTPS 域名，并填写 ADMIN_WEB_TOKEN。
# 7. 默认使用 Docker json-file 日志上限 max-size=20m/max-file=5，单容器约 100MB。
#    Docker json-file 不能严格按时间保留 72 小时；这里用大小上限近似最近日志并防止撑爆硬盘。

services:
  postgres:
    image: postgres:16-alpine
    container_name: ledger-postgres
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    environment:
      POSTGRES_DB: "ledger_bot"
      POSTGRES_USER: "ledger"
      POSTGRES_PASSWORD: "change_this_strong_password"
      TZ: "Asia/Shanghai"
    volumes:
      - ledger_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger_bot"]
      interval: 10s
      timeout: 5s
      retries: 10

  chain-postgres:
    image: postgres:16-alpine
    container_name: ledger-chain-postgres
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    environment:
      POSTGRES_DB: "ledger_chain_watcher"
      POSTGRES_USER: "chainwatcher"
      POSTGRES_PASSWORD: "change_this_chain_pg_password"
      TZ: "Asia/Shanghai"
    volumes:
      - ledger_chain_watcher_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chainwatcher -d ledger_chain_watcher"]
      interval: 10s
      timeout: 5s
      retries: 10

  ledger-chain-watcher:
    image: ghcr.io/dayou0168/telegram-ledger-chain-watcher:2.4.2
    container_name: ledger-chain-watcher
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    depends_on:
      chain-postgres:
        condition: service_healthy
    environment:
      CHAIN_WATCHER_DATABASE_URL: "postgres://chainwatcher:change_this_chain_pg_password@chain-postgres:5432/ledger_chain_watcher?sslmode=disable"
      CHAIN_WATCHER_ADDR: ":8090"
      CHAIN_WATCHER_ADMIN_TOKEN: "change_this_watcher_admin_token"
      CHAIN_WATCHER_KEY_ENCRYPTION_KEY: "replace_with_base64_32_byte_key"
      BOT_TIMEZONE: "Asia/Shanghai"
      BOT_REQUEST_TIMEOUT: "70"

      # 允许接入 watcher 的机器人清单，格式：bot_id:secret。多个用英文逗号分隔。
      CHAIN_WATCHER_BOTS: "ledger-main:change_this_chain_watcher_secret"

      # 第一版：统一请求 Tronscan/TronGrid。多个机器人不再分别配置官网 API Key。
      CHAIN_WATCHER_TRONSCAN_API_BASE: "https://apilist.tronscanapi.com/api"
      CHAIN_WATCHER_TRONSCAN_API_KEYS: "replace_key_1,replace_key_2,replace_key_3"
      CHAIN_WATCHER_TRONSCAN_API_KEY: ""
      CHAIN_WATCHER_TRON_API_KEY: ""
      TRON_USDT_CONTRACT: "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"
      CHAIN_WATCHER_SOURCE_POLL_SECONDS: "1"
      CHAIN_WATCHER_MAIN_SCAN_TIMEOUT_MS: "3000"
      CHAIN_WATCHER_MAIN_MAX_INFLIGHT_ROUNDS: "3"
      CHAIN_WATCHER_GLOBAL_SCAN_PAGES: "3"
      CHAIN_WATCHER_GLOBAL_EXPAND_PAGE_LIMIT: "20"
      CHAIN_WATCHER_CATCHUP_ENABLED: "true"
      CHAIN_WATCHER_CATCHUP_STATE_INTERVAL_SECONDS: "30"
      CHAIN_WATCHER_CATCHUP_PAGE_LIMIT: "3"
      CHAIN_WATCHER_CATCHUP_MAX_REQUESTS_PER_TICK: "6"
      CHAIN_WATCHER_CATCHUP_MAX_INFLIGHT: "3"
      CHAIN_WATCHER_CATCHUP_WINDOW_SECONDS: "30"
      CHAIN_WATCHER_CATCHUP_OVERLAP_SECONDS: "2"
      CHAIN_WATCHER_CATCHUP_MAX_RPS: "8"
      CHAIN_WATCHER_TRONSCAN_KEY_INTERVAL_MS: "200"
      CHAIN_WATCHER_LOOKBACK_SECONDS: "600"
      CHAIN_WATCHER_CLAIM_LEASE_SECONDS: "30"
      CHAIN_WATCHER_DELIVERY_RETRY_SECONDS: "2"

      # 未来接 TRON Lite FullNode + Event Plugin V2 + Kafka 时，再由链上监听实现线程扩展：
      # CHAIN_WATCHER_SOURCE: "kafka"
      # KAFKA_BROKERS: "tron-kafka:9092"
      # KAFKA_TOPIC: "tron-events"
    expose:
      - "8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  ledger-bot:
    image: ghcr.io/dayou0168/telegram-ledger-bot-go:2.4.2
    container_name: ledger-bot-go
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy
      ledger-chain-watcher:
        condition: service_healthy
    environment:
      # ==================== 必填配置 ====================
      TELEGRAM_BOT_TOKEN: "123456:replace-me"
      TELEGRAM_BOT_USERNAME: "your_bot_username"
      BOT_HOST_USER_ID: "123456789"
      DATABASE_URL: "postgres://ledger:change_this_strong_password@postgres:5432/ledger_bot?sslmode=disable"

      # 必填：共享链上监听服务。BOT_ID 必须出现在 watcher 的 CHAIN_WATCHER_BOTS 中。
      CHAIN_WATCHER_URL: "http://ledger-chain-watcher:8090"
      CHAIN_WATCHER_BOT_ID: "ledger-main"
      CHAIN_WATCHER_SECRET: "change_this_chain_watcher_secret"
      # 正常模式只消费 watcher 事件；持续异常时由共享 PostgreSQL lease 选出一个无 Key leader fallback。

      # ==================== 选填配置 ====================
      DEFAULT_OPERATOR_USER_IDS: ""
      PUBLIC_BILL_BASE_URL: ""
      ADMIN_WEB_TOKEN: "change_this_admin_password"
      # 普通用户上限；仅宿主、DEFAULT_OPERATOR_USER_IDS、active global_operators 不受限，单群 operators 不豁免。
      ADDRESS_WATCH_FREE_LIMIT: "2"

      # ==================== 高级配置 ====================
      BOT_TIMEZONE: "Asia/Shanghai"
      BOT_WORKER_THREADS: "16"
      BOT_CONTROL_THREADS: "6"
      BOT_CHAIN_THREADS: "12"
      BOT_RATE_THREADS: "2"
      BOT_BROADCAST_THREADS: "4"
      BOT_QUERY_THREADS: "4"
      BOT_NOTIFICATION_THREADS: "6"
      BOT_QUEUE_SIZE: "4096"
      TELEGRAM_API_BASE: "https://api.telegram.org"
      BOT_POLL_TIMEOUT: "50"
      BOT_REQUEST_TIMEOUT: "30"
      # 多 bot 通过共享 PostgreSQL lease 只选一个无 Key leader fallback；仅明确批准常驻备用源时填写 Key。
      TRONGRID_API_KEY: ""
      TRON_USDT_CONTRACT: "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"
      TRON_ADDRESS_BACKFILL_SECONDS: "60"
      TRON_INITIAL_LOOKBACK_MINUTES: "15"
      CHAIN_WATCHER_POLL_SECONDS: "1"
      CHAIN_WATCHER_BATCH_SIZE: "50"
      BOT_WATCHER_HEALTH_INTERVAL_SECONDS: "1"
      BOT_WATCHER_FAIL_THRESHOLD: "3"
      BOT_WATCHER_CLAIM_TIMEOUT_MS: "2000"
      BOT_FALLBACK_POLL_SECONDS: "1"
      BOT_FALLBACK_SHARED_DATABASE_URL: "postgres://chainwatcher:change_this_chain_pg_password@chain-postgres:5432/ledger_chain_watcher?sslmode=disable"
      BOT_FALLBACK_INSTANCE_ID: ""
      BOT_FALLBACK_LEASE_SECONDS: "15"
      BOT_FALLBACK_GLOBAL_PAGES: "3"
      BOT_FALLBACK_REQUEST_INTERVAL_MS: "200"
      BOT_FALLBACK_RECOVERY_SUCCESS_ROUNDS: "3"
      BOT_FALLBACK_RECOVERY_LAG_SECONDS: "5"
      BOT_FALLBACK_MAX_REQUESTS_PER_TICK: "6"
      BOT_FALLBACK_WINDOW_SECONDS: "30"
      P2P_RATE_API_BASE: "https://p2p.army/api/fapi"
      P2P_RATE_FRONT_API: "NextVOF2Ozuh36mW0TCv"
      P2P_RATE_MARKET: "okx"
      P2P_RATE_FIAT_UNIT: "CNY"
      P2P_RATE_ASSET: "USDT"
      P2P_RATE_TRADE_METHODS: "aliPay"
      P2P_RATE_REFRESH_SECONDS: "60"
      P2P_RATE_CACHE_TTL_SECONDS: "180"
      ADMIN_WEB_ENABLED: "1"
      ADMIN_WEB_HOST: "0.0.0.0"
      ADMIN_WEB_PORT: "8080"
    ports:
      - "8080:8080"

volumes:
  ledger_pg_data:
  ledger_chain_watcher_pg_data:
