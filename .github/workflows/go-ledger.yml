name: Go Ledger Runtime

on:
  push:
    branches:
      - main
      - master
    paths:
      - "go-ledger/**"
      - ".github/workflows/go-ledger.yml"
  pull_request:
    paths:
      - "go-ledger/**"
      - ".github/workflows/go-ledger.yml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ledger_bot_test
          POSTGRES_USER: ledger
          POSTGRES_PASSWORD: ledger
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ledger -d ledger_bot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download dependencies
        working-directory: go-ledger
        run: go mod download

      - name: Test
        working-directory: go-ledger
        env:
          TEST_DATABASE_URL: postgres://ledger:ledger@localhost:5432/ledger_bot_test?sslmode=disable
        run: go test ./...

      - name: Build
        working-directory: go-ledger
        run: |
          go build ./cmd/ledger-bot
          go build ./cmd/chain-watcher

      - name: Build host chain watcher package
        working-directory: go-ledger
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/ledger-chain-watcher-v2.3.7-linux-amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/ledger-chain-watcher-linux-amd64 ./cmd/chain-watcher
          cp dist/ledger-chain-watcher-linux-amd64 dist/ledger-chain-watcher-v2.3.7-linux-amd64/ledger-chain-watcher
          cp ../deploy/ledger-chain-watcher.env.example dist/ledger-chain-watcher-v2.3.7-linux-amd64/
          cp ../deploy/ledger-chain-watcher.service dist/ledger-chain-watcher-v2.3.7-linux-amd64/
          tar -C dist -czf dist/ledger-chain-watcher-v2.3.7-linux-amd64.tar.gz ledger-chain-watcher-v2.3.7-linux-amd64
          sha256sum dist/ledger-chain-watcher-linux-amd64 > dist/ledger-chain-watcher-linux-amd64.sha256
          sha256sum dist/ledger-chain-watcher-v2.3.7-linux-amd64.tar.gz > dist/ledger-chain-watcher-v2.3.7-linux-amd64.tar.gz.sha256

      - name: Upload host chain watcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: ledger-chain-watcher-v2.3.7-linux-amd64
          path: |
            go-ledger/dist/ledger-chain-watcher-linux-amd64
            go-ledger/dist/ledger-chain-watcher-linux-amd64.sha256
            go-ledger/dist/ledger-chain-watcher-v2.3.7-linux-amd64.tar.gz
            go-ledger/dist/ledger-chain-watcher-v2.3.7-linux-amd64.tar.gz.sha256

      - name: Build Docker images
        working-directory: go-ledger
        run: |
          docker build --build-arg APP=ledger-bot -t telegram-ledger-bot-go:2.3.7 .
          docker build --build-arg APP=chain-watcher -t telegram-ledger-chain-watcher:2.3.7 .

      - name: Login to GHCR
        if: github.event_name == 'push'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish Docker image
        if: github.event_name == 'push'
        working-directory: go-ledger
        run: |
          BOT_IMAGE="ghcr.io/${{ github.repository_owner }}/telegram-ledger-bot-go"
          WATCHER_IMAGE="ghcr.io/${{ github.repository_owner }}/telegram-ledger-chain-watcher"
          docker tag telegram-ledger-bot-go:2.3.7 "$BOT_IMAGE:2.3.7"
          docker tag telegram-ledger-bot-go:2.3.7 "$BOT_IMAGE:latest"
          docker tag telegram-ledger-chain-watcher:2.3.7 "$WATCHER_IMAGE:2.3.7"
          docker tag telegram-ledger-chain-watcher:2.3.7 "$WATCHER_IMAGE:latest"
          docker push "$BOT_IMAGE:2.3.7"
          docker push "$BOT_IMAGE:latest"
          docker push "$WATCHER_IMAGE:2.3.7"
          docker push "$WATCHER_IMAGE:latest"

      - name: Publish host chain watcher release asset
        if: github.event_name == 'push'
        working-directory: go-ledger
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ASSETS=(
            "dist/ledger-chain-watcher-linux-amd64"
            "dist/ledger-chain-watcher-linux-amd64.sha256"
            "dist/ledger-chain-watcher-v2.3.7-linux-amd64.tar.gz"
            "dist/ledger-chain-watcher-v2.3.7-linux-amd64.tar.gz.sha256"
          )
          if gh release view v2.3.7 --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload v2.3.7 "${ASSETS[@]}" --clobber --repo "${{ github.repository }}"
          else
            gh release create v2.3.7 "${ASSETS[@]}" \
              --target "${{ github.sha }}" \
              --title "Go v2.3.7" \
              --notes "Go v2.3.7 runtime images and host ledger-chain-watcher binary." \
              --latest \
              --repo "${{ github.repository }}"
          fi
