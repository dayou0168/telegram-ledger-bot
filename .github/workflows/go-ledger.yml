name: Go Ledger Runtime

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"
    paths:
      - ".env.example"
      - ".github/workflows/go-ledger.yml"
      - "README.md"
      - "deploy/**"
      - "docker-compose*.yml"
      - "docs/**"
      - "go-ledger/**"
  pull_request:
    paths:
      - ".env.example"
      - ".github/workflows/go-ledger.yml"
      - "README.md"
      - "deploy/**"
      - "docker-compose*.yml"
      - "docs/**"
      - "go-ledger/**"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix; must equal config.Version"
        required: true
        type: string

permissions:
  contents: read

jobs:
  ci:
    name: PostgreSQL 16 CI
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ledger_bot_test
          POSTGRES_USER: ledger
          POSTGRES_PASSWORD: ledger
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ledger -d ledger_bot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go-ledger/go.mod
          cache-dependency-path: go-ledger/go.sum

      - name: Validate shell syntax
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' scripts < <(find deploy -type f -name '*.sh' -print0)
          test "${#scripts[@]}" -gt 0
          for script in "${scripts[@]}"; do
            bash -n "$script"
          done

      - name: Validate YAML syntax
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find . -type f \( -name '*.yml' -o -name '*.yaml' \) -print0)
          test "${#files[@]}" -gt 0
          ruby -e 'require "yaml"; ARGV.each { |file| abort("invalid YAML: #{file}") unless YAML.parse_file(file) }' "${files[@]}"

      - name: Scan tracked files for sensitive material
        shell: bash
        run: |
          set -euo pipefail
          forbidden_files="$RUNNER_TEMP/forbidden-secret-files.txt"
          pattern='-----BEGIN (RSA |OPENSSH |EC )?PRIVATE KEY-----|github_pat_[A-Za-z0-9_]{40,}|gh[pousr]_[A-Za-z0-9_]{30,}|[0-9]{8,10}:[A-Za-z0-9_-]{35,}'
          git grep -IlE -e "$pattern" -- . > "$forbidden_files" || true
          git ls-files | grep -E '(^|/)(\.env|id_rsa|id_ed25519|[^/]+\.(pem|key))$' >> "$forbidden_files" || true
          sort -u -o "$forbidden_files" "$forbidden_files"
          if test -s "$forbidden_files"; then
            echo "Potential secret material exists in these tracked files:"
            sed 's/^/  /' "$forbidden_files"
            exit 1
          fi

      - name: Check Go formatting
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="$PR_BASE_SHA"
          elif [[ "$EVENT_NAME" == "push" && "$GITHUB_REF" != refs/tags/* ]]; then
            base="$BEFORE_SHA"
          else
            base="$(git describe --tags --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null || true)"
          fi
          if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            base="$(git rev-list --max-parents=0 HEAD)"
          fi
          mapfile -t files < <(git diff --name-only --diff-filter=ACMRT "$base" "$GITHUB_SHA" -- go-ledger | sed -n '/\.go$/p')
          if [[ "${#files[@]}" -eq 0 ]]; then
            exit 0
          fi
          unformatted="$(gofmt -l "${files[@]}")"
          if test -n "$unformatted"; then
            echo "Go files require gofmt:"
            printf '%s\n' "$unformatted"
            exit 1
          fi

      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail
          version="$(awk -F'"' '/^const Version = / { print $2; exit }' go-ledger/internal/config/config.go)"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test -f "docs/releases/v${version}.md"
          grep -Fq "telegram-ledger-bot-go:${version}" docker-compose.yml
          grep -Fq "telegram-ledger-chain-watcher:${version}" docker-compose.yml

      - name: Download dependencies
        working-directory: go-ledger
        run: go mod download

      - name: Test against isolated PostgreSQL 16
        working-directory: go-ledger
        env:
          TEST_DATABASE_URL: postgres://ledger:ledger@localhost:5432/ledger_bot_test?sslmode=disable
        run: go test -count=1 ./...

      - name: Vet
        working-directory: go-ledger
        run: go vet ./...

      - name: Build bot and watcher
        working-directory: go-ledger
        run: |
          set -euo pipefail
          go build -o "$RUNNER_TEMP/ledger-bot" ./cmd/ledger-bot
          go build -o "$RUNNER_TEMP/ledger-chain-watcher" ./cmd/chain-watcher

  race:
    name: Critical package race tests
    needs: ci
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ledger_bot_race_test
          POSTGRES_USER: ledger
          POSTGRES_PASSWORD: ledger
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ledger -d ledger_bot_race_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go-ledger/go.mod
          cache-dependency-path: go-ledger/go.sum

      - name: Download dependencies
        working-directory: go-ledger
        run: go mod download

      - name: Race test critical packages against isolated PostgreSQL 16
        working-directory: go-ledger
        env:
          TEST_DATABASE_URL: postgres://ledger:ledger@localhost:5432/ledger_bot_race_test?sslmode=disable
        run: >-
          go test -race -count=1
          ./internal/permissions
          ./internal/bot
          ./internal/adminweb
          ./internal/storage
          ./internal/chainwatcher
          ./internal/tron

  release:
    name: Explicit release
    needs:
      - ci
      - race
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go-ledger/go.mod
          cache-dependency-path: go-ledger/go.sum

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate explicit release request
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REQUESTED_VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          source_version="$(awk -F'"' '/^const Version = / { print $2; exit }' go-ledger/internal/config/config.go)"
          if [[ ! "$source_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "config.Version is not a release version"
            exit 1
          fi

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            case "$GITHUB_REF" in
              refs/heads/main|refs/heads/master) ;;
              *) echo "Manual releases must run from main or master"; exit 1 ;;
            esac
            if [[ "$REQUESTED_VERSION" != "$source_version" ]]; then
              echo "Requested version does not match config.Version"
              exit 1
            fi
          else
            if [[ "$REF_NAME" != "v${source_version}" ]]; then
              echo "Tag does not match config.Version"
              exit 1
            fi
            if [[ "$(git rev-list -n 1 "$REF_NAME")" != "$GITHUB_SHA" ]]; then
              echo "Release tag does not point to the checked out commit"
              exit 1
            fi
            if ! git branch -r --contains "$GITHUB_SHA" | grep -Eq 'origin/(main|master)$'; then
              echo "Release tag commit is not contained in main or master"
              exit 1
            fi
          fi

          tag="v${source_version}"
          notes="docs/releases/${tag}.md"
          test -f "$notes"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release already exists; refusing to overwrite it"
            exit 1
          fi
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]] && git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag already exists; use the tag-triggered release path instead"
            exit 1
          fi

          echo "version=$source_version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "notes=$notes" >> "$GITHUB_OUTPUT"

      - name: Build release files
        working-directory: go-ledger
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          rm -rf dist
          package="ledger-chain-watcher-v${VERSION}-linux-amd64"
          mkdir -p "dist/${package}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/ledger-chain-watcher-linux-amd64 ./cmd/chain-watcher
          cp dist/ledger-chain-watcher-linux-amd64 "dist/${package}/ledger-chain-watcher"
          cp ../deploy/ledger-chain-watcher.env.example "dist/${package}/"
          cp ../deploy/ledger-chain-watcher.service "dist/${package}/"
          tar -C dist -czf "dist/${package}.tar.gz" "$package"
          git -C .. archive --format=tar.gz -o "go-ledger/dist/telegram-ledger-bot-v${VERSION}-source.tar.gz" HEAD
          (
            cd dist
            sha256sum ledger-chain-watcher-linux-amd64 > ledger-chain-watcher-linux-amd64.sha256
            sha256sum "${package}.tar.gz" > "${package}.tar.gz.sha256"
            sha256sum "telegram-ledger-bot-v${VERSION}-source.tar.gz" > "telegram-ledger-bot-v${VERSION}-source.tar.gz.sha256"
            sha256sum ledger-chain-watcher-linux-amd64 "${package}.tar.gz" "telegram-ledger-bot-v${VERSION}-source.tar.gz" > SHA256SUMS
          )

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish exact and latest images
        working-directory: go-ledger
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          bot_image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/telegram-ledger-bot-go"
          watcher_image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/telegram-ledger-chain-watcher"
          docker buildx build --platform linux/amd64 --build-arg APP=ledger-bot --tag "${bot_image}:${VERSION}" --tag "${bot_image}:latest" --push .
          docker buildx build --platform linux/amd64 --build-arg APP=chain-watcher --tag "${watcher_image}:${VERSION}" --tag "${watcher_image}:latest" --push .

          bot_digest="$(docker buildx imagetools inspect "${bot_image}:${VERSION}" | awk '/^Digest:/ { print $2; exit }')"
          watcher_digest="$(docker buildx imagetools inspect "${watcher_image}:${VERSION}" | awk '/^Digest:/ { print $2; exit }')"
          [[ "$bot_digest" == sha256:* ]]
          [[ "$watcher_digest" == sha256:* ]]
          {
            printf '%s:%s %s@%s\n' "$bot_image" "$VERSION" "$bot_image" "$bot_digest"
            printf '%s:%s %s@%s\n' "$watcher_image" "$VERSION" "$watcher_image" "$watcher_digest"
          } > dist/image-digests.txt

      - name: Create immutable GitHub Release
        working-directory: go-ledger
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.release.outputs.version }}
          TAG: ${{ steps.release.outputs.tag }}
          NOTES: ${{ steps.release.outputs.notes }}
        run: |
          set -euo pipefail
          package="ledger-chain-watcher-v${VERSION}-linux-amd64"
          assets=(
            "dist/ledger-chain-watcher-linux-amd64"
            "dist/ledger-chain-watcher-linux-amd64.sha256"
            "dist/${package}.tar.gz"
            "dist/${package}.tar.gz.sha256"
            "dist/telegram-ledger-bot-v${VERSION}-source.tar.gz"
            "dist/telegram-ledger-bot-v${VERSION}-source.tar.gz.sha256"
            "dist/SHA256SUMS"
            "dist/image-digests.txt"
          )
          if [[ "$EVENT_NAME" == "push" ]]; then
            gh release create "$TAG" "${assets[@]}" --verify-tag --title "Go ${TAG}" --notes-file "../${NOTES}" --latest --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" "${assets[@]}" --target "$GITHUB_SHA" --title "Go ${TAG}" --notes-file "../${NOTES}" --latest --repo "$GITHUB_REPOSITORY"
          fi
